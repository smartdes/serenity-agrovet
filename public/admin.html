<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Serenity Agrovet Blog</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .admin-container {
            max-width: 900px;
            margin: 40px auto;
            padding: 30px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #333;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
        }

        #editor-container {
            height: 400px;
            margin-bottom: 1.5rem;
        }

        .btn-publish {
            background-color: #28a745;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.3s;
        }

        .btn-publish:hover {
            background: var(--secondary-color);
        }

        .image-preview {
            width: 100%;
            max-height: 300px;
            object-fit: cover;
            border-radius: 8px;
            margin-top: 10px;
            display: none;
        }

        .status-msg {
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }

        .status-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="nav-top">
            <div class="container">
                <a href="index.html" class="logo">
                    <span class="logo-text">
                        <span style="color: #2E7D32;">Serenity</span><span style="color: #EF4444;">Agrovet</span><span
                            style="color: #2E7D32;">Stores</span>
                    </span>
                </a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="admin-container">
            <h1>Create New Blog Post</h1>
            <form id="postForm">
                <div class="form-group">
                    <label for="title">Post Title</label>
                    <input type="text" id="title" class="form-control" required placeholder="Enter post title">
                </div>

                <div class="form-group">
                    <label for="slug">URL Slug</label>
                    <input type="text" id="slug" class="class=" form-control" required
                        placeholder="e.g. how-to-grow-maize">
                </div>

                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" class="form-control" required>
                        <option value="">Select a category</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="image">Featured Image</label>
                    <input type="file" id="image" class="form-control" accept="image/*">
                    <img id="preview" class="image-preview" alt="Preview">
                </div>

                <div class="form-group">
                    <label>Content</label>
                    <div id="editor-container"></div>
                </div>

                <button type="submit" class="btn-publish">Submit/Post</button>
            </form>
            <div id="status" class="status-msg"></div>
        </div>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script src="js/admin.js"></script>
</body>

</html>
